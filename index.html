<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- Configurações básicas -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título da página -->
    <title>Achadinhos da Shopee</title>

    <!-- Arquivo CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Fonte do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link 
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" 
        rel="stylesheet"
    >

    <!-- Ícones -->
    <link 
        rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

    <!-- ========================= -->
    <!-- HEADER -->
    <!-- ========================= -->

    <header class="header">

        <!-- Container -->
        <div class="container header-content">

            <!-- Logo -->
            <div class="logo">

                <h1>Achadinhos da Shopee</h1>

            </div>

            <!-- Barra de pesquisa -->
            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input 
                    type="text"
                    placeholder="Buscar produtos..."
                >

            </div>

            <!-- Botão Dark Mode -->
            <button 
                class="theme-button"
                id="themeButton"
                aria-label="Alternar tema"
            >

                <i class="fa-solid fa-moon"></i>

            </button>

        </div>

    </header>

    <!-- ========================= -->
    <!-- CONTEÚDO PRINCIPAL -->
    <!-- ========================= -->

    <main>

        <!-- ========================= -->
        <!-- HERO SECTION -->
        <!-- ========================= -->

        <section class="hero">

            <div class="container hero-content">

                <h2>
                    Os melhores achadinhos da Shopee
                </h2>

                <p>
                    Tecnologia, gadgets, acessórios e produtos incríveis
                    em um só lugar.
                </p>

                <!-- Botão -->
                <a href="#categorias">

                    <button class="hero-button">

                        Explorar Categorias

                    </button>

                </a>

            </div>

        </section>

        <!-- ========================= -->
        <!-- CATEGORIAS -->
        <!-- ========================= -->

        <section 
            class="categories"
            id="categorias"
        >

            <div class="container">

                <!-- Título -->
                <h2 class="section-title">

                    Categorias

                </h2>

                <!-- Grid -->
                <div class="categories-grid">

                    <!-- ========================= -->
                    <!-- CARD 1 -->
                    <!-- ========================= -->

                    <a href="pages/tecnologia.html" class="category-card">

                        <img 
                            src="images/tecnologia.jpg"
                            alt="Categoria Tecnologia"
                            loading="lazy"
                        >

                        <div class="category-content">

                            <h3>Tecnologia</h3>

                        </div>

                    </a>

                    <!-- ========================= -->
                    <!-- CARD 2 -->
                    <!-- ========================= -->

                    <a href="pages/setup gamer.html" class="category-card">

                        <img 
                            src="images/gamer.jpg"
                            alt="Categoria Setup Gamer"
                            loading="lazy"
                        >

                        <div class="category-content">

                            <h3>Setup Gamer</h3>

                        </div>

                    </a>

                    <!-- ========================= -->
                    <!-- CARD 3 -->
                    <!-- ========================= -->

                    <a href="pages/cozinha.html" class="category-card">

                        <img 
                            src="images/cozinha.jpg"
                            alt="Categoria Cozinha"
                            loading="lazy"
                        >

                        <div class="category-content">

                            <h3>Cozinha</h3>

                        </div>

                    </a>

                    <!-- ========================= -->
                    <!-- CARD 4 -->
                    <!-- ========================= -->

                    <a href="pages/quarto.html" class="category-card">

                        <img 
                            src="images/quarto.jpg"
                            alt="Categoria Quarto"
                            loading="lazy"
                        >

                        <div class="category-content">

                            <h3>Quarto</h3>

                        </div>

                    </a>

                    <!-- ========================= -->
                    <!-- CARD 5 -->
                    <!-- ========================= -->

                    <a href="pages/gadgets.html" class="category-card">

                        <img 
                            src="images/gadgets.jpg"
                            alt="Categoria Gadgets"
                            loading="lazy"
                        >

                        <div class="category-content">

                            <h3>Gadgets</h3>

                        </div>

                    </a>

                    <!-- ========================= -->
                    <!-- CARD 6 -->
                    <!-- ========================= -->

                    <a href="pages/academia.html" class="category-card">

                        <img 
                            src="images/academia.jpg"
                            alt="Categoria Academia"
                            loading="lazy"
                        >

                        <div class="category-content">

                            <h3>Academia</h3>

                        </div>

                    </a>

                </div>

            </div>

        </section>

    </main>

    <!-- ========================= -->
    <!-- FOOTER -->
    <!-- ========================= -->

    <footer class="footer">

        <div class="container">

            <h3>
                Desenvolvido por André Cunha
            </h3>

            <!-- Links -->
            <div class="footer-links">

                <a href="#">

                    <i class="fa-brands fa-instagram"></i>

                    Instagram

                </a>

                <a href="#">

                    <i class="fa-brands fa-github"></i>

                    GitHub

            </div>

        </div>

    </footer>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>
</html>
