<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <!-- Configurações -->
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Título -->
    <title>Tecnologia | Achadinhos da Shopee</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../style.css">

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link 
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" 
        rel="stylesheet"
    >

    <!-- Ícones -->
    <link 
        rel="stylesheet" 
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >

</head>

<body>

    <!-- ========================= -->
    <!-- HEADER -->
    <!-- ========================= -->

    <header class="header">

        <div class="container header-content">

            <!-- Logo -->
            <div class="logo">

                <h1>Achadinhos da Shopee</h1>

            </div>

            <!-- Busca -->
            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input 
                    type="text"
                    placeholder="Buscar produtos..."
                >

            </div>

            <!-- Botão Dark Mode -->
            <button 
                class="theme-button"
                id="themeButton"
                aria-label="Alternar tema"
            >

                <i class="fa-solid fa-moon"></i>

            </button>

        </div>

    </header>

    <!-- ========================= -->
    <!-- HERO -->
    <!-- ========================= -->

    <section class="hero">

        <div class="container hero-content">

            <h2>
                Produtos de setup gamer
            </h2>

            <p>
                Os setups gamers mais insanos, periféricos RGB
                e acessórios para elevar sua gameplay.
            </p>

        </div>

    </section>

    <!-- ========================= -->
    <!-- PRODUTOS -->
    <!-- ========================= -->

    <section class="categories">

        <div class="container">

            <h2 class="section-title">

                Produtos em destaque

            </h2>

            <!-- Grid -->
            <div class="categories-grid">

                <!-- ========================= -->
                <!-- PRODUTO 1 -->
                <!-- ========================= -->

                <a 
                    href="#"
                    target="_blank"
                    class="category-card"
                >

                    <img 
                        src="../assets/images/produto1.jpg"
                        alt="Produto Tecnologia"
                        loading="lazy"
                    >

                    <div class="category-content">

                        <h3>Mouse Gamer RGB</h3>

                    </div>

                </a>

                <!-- ========================= -->
                <!-- PRODUTO 2 -->
                <!-- ========================= -->

                <a 
                    href="#"
                    target="_blank"
                    class="category-card"
                >

                    <img 
                        src="../assets/images/produto2.jpg"
                        alt="Produto Tecnologia"
                        loading="lazy"
                    >

                    <div class="category-content">

                        <h3>Teclado Mecânico</h3>

                    </div>

                </a>

                <!-- ========================= -->
                <!-- PRODUTO 3 -->
                <!-- ========================= -->

                <a 
                    href="#"
                    target="_blank"
                    class="category-card"
                >

                    <img 
                        src="../assets/images/produto3.jpg"
                        alt="Produto Tecnologia"
                        loading="lazy"
                    >

                    <div class="category-content">

                        <h3>Headset Gamer</h3>

                    </div>

                </a>

                <!-- ========================= -->
                <!-- PRODUTO 4 -->
                <!-- ========================= -->

                <a 
                    href="#"
                    target="_blank"
                    class="category-card"
                >

                    <img 
                        src="../assets/images/produto4.jpg"
                        alt="Produto Tecnologia"
                        loading="lazy"
                    >

                    <div class="category-content">

                        <h3>Water Cooler</h3>

                    </div>

                </a>

            </div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- BOTÃO VOLTAR -->
    <!-- ========================= -->

    <section class="categories">

        <div class="container">

            <div style="text-align: center;">

                <a href="../index.html">

                    <button class="hero-button">

                        Voltar para Home

                    </button>

                </a>

            </div>

        </div>

    </section>

    <!-- ========================= -->
    <!-- FOOTER -->
    <!-- ========================= -->

    <footer class="footer">

        <div class="container">

            <h3>
                Desenvolvido por André Cunha
            </h3>

            <!-- Links -->
            <div class="footer-links">

                <a href="#">

                    <i class="fa-brands fa-instagram"></i>

                    Instagram

                </a>

                <a href="#">

                    <i class="fa-brands fa-github"></i>

                    GitHub

                </a>

            </div>

        </div>

    </footer>

    <!-- JavaScript -->
    <script src="../script.js"></script>

</body>
</html>
